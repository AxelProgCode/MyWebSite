        <div class="feature-cards">
            
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSflLKcJpbcuOj3rgFFUiwgh9yBiiIDjEreZpiyDqljbLPU-6w/viewform?embedded=true" width="500" height="500" frameborder="0" marginheight="0" marginwidth="0">Caricamento…</iframe>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSds8ANgr3Ye95Uzf1LvK3IzJv6q48i_CPy8m5KfAZjl7As6iw/viewform?embedded=true" width="500" height="500" frameborder="0" marginheight="0" marginwidth="0">Caricamento…</iframe>

        </div><br><br><br>

        <div id="supporters-container"></div>
        <script>
            // Carica e inserisce il contenuto di supporters.html senza iframe
            fetch('supporters.html')
            .then(response => response.text())
            .then(html => {
                // Estrae solo il contenuto del <body> di supporters.html
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                const bodyContent = tempDiv.querySelector('body') ? tempDiv.querySelector('body').innerHTML : html;
                document.getElementById('supporters-container').innerHTML = bodyContent;
            })
            .catch(error => {
                document.getElementById('supporters-container').innerHTML = '<p>Impossibile caricare i sostenitori.</p>';
            });
        </script>
